<!DOCTYPE html>
<html>
<head>
    <title>Student App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
   <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">🎓 Student Panel</a>

    <div>
      <a href="/" class="btn btn-outline-light me-2">Add</a>
      <a href="/students" class="btn btn-outline-light me-2">Students</a>
      <a href="/logout" class="btn btn-danger">Logout</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">🎓 Add Student</h2>

        <form method="POST" action="/add">
            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Age</label>
                <input type="number" name="age" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Course</label>
                <input type="text" name="course" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Marks</label>
                <input type="number" name="marks" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100">Add Student</button>
        </form>

        <a href="/students" class="btn btn-success mt-3">📋 View Students</a>
    </div>
</div>

</body>
</html>
